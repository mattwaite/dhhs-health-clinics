name: Update Nebraska Health Clinic Roster

on:
  schedule:
    - cron: '0 9 16 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser
        run: python parse_health_clinics.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ pdfs/
          git diff --staged --quiet || git commit -m "Update health clinic roster $(date +%Y-%m-%d)"
          git push
